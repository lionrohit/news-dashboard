<!DOCTYPE html>
<html>
<head>
    <title>News Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #111; color: #eee; font-family: Arial; padding: 10px; }
        .card { background: #222; margin: 12px 0; padding: 12px; border-radius: 10px; display: flex; gap: 10px; }
        .content { flex: 1; }
        img { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; }
        a { color: #4da6ff; text-decoration: none; }
        h3 { margin: 0 0 5px 0; }
        .source { font-size: 12px; color: #aaa; margin-bottom: 5px; }
    </style>
</head>
<body>

<h2>🌍 Daily Intelligence Brief</h2>

{% for item in news %}
<div class="card">

    {% if item.image %}
        <img src="{{ item.image }}">
    {% endif %}

    <div class="content">
        <div class="source">{{ item.source }}</div>
        <h3>{{ item.title }}</h3>
        <p>{{ item.summary }}</p>
        <a href="{{ item.link }}" target="_blank">Read more →</a>
    </div>

</div>
{% endfor %}

</body>
</html>
